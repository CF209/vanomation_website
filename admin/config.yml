backend:
  name: git-gateway
  branch: main

media_folder: "assets/img/uploads"
public_folder: "assets/img/uploads"

collections:

  # ── Tutorials ──────────────────────────────────────────────────────────────
  # Single page: drag to reorder, click to edit, + to add, trash to delete.
  # Order here controls both the nav dropdown and the "Next" links on each page.
  - name: "tutorials"
    label: "Tutorials"
    files:
      - name: "tutorials_list"
        label: "Tutorials"
        file: "_data/tutorials.yml"
        fields:
          - name: "tutorials"
            label: "All Tutorials"
            widget: "list"
            summary: "{{title}}"
            hint: "Drag rows to reorder. Click a tutorial to expand and edit it. Use the + button to add a new tutorial."
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - label: "URL Slug"
                name: "slug"
                widget: "string"
                hint: "Lowercase letters, numbers, and underscores only — no spaces, no .html (e.g. my_tutorial). This becomes the page URL."
              - name: "images"
                label: "Carousel Images"
                widget: "list"
                required: false
                hint: "Images shown at the top of the page in a slideshow. Leave empty for no carousel."
                field: { label: "Image path", name: "item", widget: "image" }
              - name: "content"
                label: "Content"
                widget: "markdown"
                hint: >
                  Write your tutorial content here. Switch to HTML mode (the < > button) to use
                  special styled boxes: <div class="amazon">...</div> for product lists,
                  <div class="terminal">...</div> for code/commands,
                  <div class="tut_img"><img src="..."></div> for inline images.
